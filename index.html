<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Formulario de Registro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="tarjeta">
    <h1>Formulario de Registro</h1>
    <p class="subtitulo">Completa tus datos para crear tu cuenta</p>

    <form id="formRegistro" novalidate>

    <label for="nombreCompleto">Nombre completo</label>
    <input type="text" id="nombreCompleto" name="nombreCompleto" required minlength="3">
    <span class="error" id="error-nombreCompleto"></span>

    <label for="username">Nombre de usuario</label>
    <input type="text" id="username" name="username" required pattern="^[a-zA-Z0-9_]{4,15}$">
    <span class="error" id="error-username"></span>

    <label for="email">Correo electrónico</label>
    <input type="email" id="email" name="email" required>
    <span class="error" id="error-email"></span>

    <label for="fechaNacimiento">Fecha de nacimiento</label>
    <input type="date" id="fechaNacimiento" name="fechaNacimiento" required>
    <span class="error" id="error-fechaNacimiento"></span>

    <label for="pais">País</label>
    <select id="pais" name="pais" required>
      <option value="">-- Seleccione --</option>
      <option value="PE">Perú</option>
      <option value="CO">Colombia</option>
      <option value="MX">México</option>
      <option value="AR">Argentina</option>
    </select>
    <span class="error" id="error-pais"></span>

    <label for="password">Contraseña</label>
    <input type="password" id="password" name="password" required minlength="8">
    <span class="error" id="error-password"></span>

    <label for="confirmPassword">Confirmar contraseña</label>
    <input type="password" id="confirmPassword" name="confirmPassword" required>
    <span class="error" id="error-confirmPassword"></span>

    <label class="label-checkbox">
      <input type="checkbox" id="terminos" name="terminos" required>
      Acepto los términos y condiciones
    </label>
    <span class="error" id="error-terminos"></span>

    <button type="submit">Registrarse</button>

    <p id="resultado" class="resultado"></p>
  </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
